server {
    server_name profile.kisakay.com;

    location / {
        proxy_pass http://localhost:13873;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;

    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/profile.kisakay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/profile.kisakay.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

}

server {
    if ($host = profile.kisakay.com) {
        return 301 https://$host$request_uri;
    } 

    server_name profile.kisakay.com;
    listen 80;
    return 404;
}